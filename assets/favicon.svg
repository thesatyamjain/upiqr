<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dce8ff"/>
      <stop offset="100%" stop-color="#c8d8f8"/>
    </linearGradient>
    <!-- QR pattern gradient (navy → blue) -->
    <linearGradient id="qr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d377c"/>
      <stop offset="100%" stop-color="#456ddb"/>
    </linearGradient>
    <!-- Scanning beam gradient: glow trail above the line, sharp leading edge -->
    <linearGradient id="beam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#365fd6" stop-opacity="0"/>
      <stop offset="70%"  stop-color="#365fd6" stop-opacity="0.18"/>
      <stop offset="95%"  stop-color="#5b82f0" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#7faeff" stop-opacity="0.95"/>
    </linearGradient>
    <!-- Clip to keep animation inside the rounded tile -->
    <clipPath id="tile-clip">
      <rect width="64" height="64" rx="14"/>
    </clipPath>
  </defs>

  <!-- Background tile -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- QR code pattern (inside clip so scan beam also clips) -->
  <g clip-path="url(#tile-clip)">
    <!-- Top-left finder: outer ring -->
    <rect x="9"  y="9"  width="19" height="19" rx="3" fill="none" stroke="url(#qr)" stroke-width="4.5"/>
    <!-- Top-left finder: inner dot -->
    <rect x="15" y="15" width="7"  height="7"  rx="1.5" fill="url(#qr)"/>

    <!-- Top-right finder: outer ring -->
    <rect x="36" y="9"  width="19" height="19" rx="3" fill="none" stroke="url(#qr)" stroke-width="4.5"/>
    <!-- Top-right finder: inner dot -->
    <rect x="42" y="15" width="7"  height="7"  rx="1.5" fill="url(#qr)"/>

    <!-- Bottom-left finder: outer ring -->
    <rect x="9"  y="36" width="19" height="19" rx="3" fill="none" stroke="url(#qr)" stroke-width="4.5"/>
    <!-- Bottom-left finder: inner dot -->
    <rect x="15" y="42" width="7"  height="7"  rx="1.5" fill="url(#qr)"/>

    <!-- Bottom-right data dots -->
    <rect x="36" y="36" width="6" height="6" rx="1.5" fill="url(#qr)"/>
    <rect x="49" y="36" width="6" height="6" rx="1.5" fill="url(#qr)"/>
    <rect x="36" y="49" width="6" height="6" rx="1.5" fill="url(#qr)"/>
    <rect x="43" y="43" width="6" height="6" rx="1.5" fill="url(#qr)"/>
    <rect x="49" y="49" width="6" height="6" rx="1.5" fill="url(#qr)"/>

    <!-- ── Scanning beam group ── -->
    <!-- Soft glow trail (16px tall gradient rect, leads the bright line) -->
    <rect id="beam-glow" x="6" y="-18" width="52" height="18" fill="url(#beam)">
      <animate attributeName="y" values="-18;64;-18" dur="2.2s" repeatCount="indefinite"
               calcMode="spline" keyTimes="0;0.5;1"
               keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>
    </rect>
    <!-- Sharp bright leading edge (1.5px line) -->
    <rect x="6" y="0" width="52" height="1.5" rx="0.75"
          fill="#5b8fff" opacity="0.9">
      <animate attributeName="y" values="-1;64;-1" dur="2.2s" repeatCount="indefinite"
               calcMode="spline" keyTimes="0;0.5;1"
               keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>
      <animate attributeName="opacity" values="0;0.9;0.9;0" dur="2.2s" repeatCount="indefinite"
               keyTimes="0;0.05;0.92;1"/>
    </rect>
  </g>
</svg>
